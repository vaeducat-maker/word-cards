<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Trainer</title>

<style>

body{
font-family:sans-serif;
background:white;
margin:0;
padding:20px;
text-align:center;
color:#1f2937;
}

h2{
margin:0 0 14px;
font-size:28px;
}

.counter{
margin:8px 0 6px;
font-weight:600;
color:#475569;
}

.card{
padding:40px 20px;
border-radius:22px;
margin:18px auto;
max-width:420px;
min-height:180px;
display:flex;
flex-direction:column;
justify-content:center;
box-shadow:0 10px 24px rgba(0,0,0,0.12);
transition:transform .22s ease,opacity .22s ease;
cursor:pointer;
}

.card.fly-left{
transform:translateX(-120%) rotate(-10deg);
opacity:0;
}

.card.fly-right{
transform:translateX(120%) rotate(10deg);
opacity:0;
}

.word{
font-size:40px;
margin-bottom:10px;
}

.translation{
font-size:26px;
color:#374151;
min-height:34px;
}

button{
padding:12px 18px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
color:white;
margin:6px;
}

.btn-show{background:#5aa9ff}
.btn-reset{background:#ff9b42}
.btn-undo{background:#ef6c6c}

.writing{
max-width:500px;
margin:auto;
}

.letters{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:20px;
}

.letters button{
background:#4cc98b;
}

.slots{
font-size:34px;
letter-spacing:8px;
margin-top:20px;
}

.error{
background:#ff6b6b!important;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

</style>
</head>

<body>

<h2>Word Cards</h2>

<div id="counter" class="counter"></div>

<div id="cardView">

<div id="card" class="card" onclick="flip()">
<div id="word" class="word">loading...</div>
<div id="translation" class="translation">?</div>
</div>

<button class="btn-show" onclick="flip()">Show</button>
<button class="btn-undo" onclick="undo()">Undo</button>
<button class="btn-reset" onclick="resetDeck()">Reset</button>

</div>

<div id="writingView" style="display:none">

<h2>Writing</h2>

<div class="writing">

<div id="slots" class="slots"></div>

<div id="letters" class="letters"></div>

</div>

</div>

<script>

/* ----------------------------- DATA ----------------------------- */

const sheetID="1-4xkhAAXy0lWbbcWsFHuauzUyyckj-RkLPQJ-s4503M"
const sheetName="prilozenije"

let rows=[]
let words=[]
let history=[]

let i=0
let show=false
let animating=false

let writing=false
let writingWords=[]
let currentWritingIndex=0

let currentAnswer=""
let currentSlots=[]
let mistakes=0

/* ----------------------------- LOAD ----------------------------- */

function loadWords(){

const url=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${sheetName}`

fetch(url)

.then(r=>r.text())

.then(text=>{

const json=JSON.parse(text.substring(47).slice(0,-2))
const rowsRaw=json.table.rows||[]

rows=rowsRaw.map(r=>[
r.c[0]?.v||"",
r.c[1]?.v||"",
r.c[2]?.v||"",
r.c[3]?.v||"",
r.c[4]?.v||"",
r.c[5]?.v||"",
])

buildDeck()

})

}

/* ----------------------------- DECK ----------------------------- */

function buildDeck(){

words=rows.map(r=>({

word:r[5],
translation:r[4]

})).filter(w=>w.word&&w.translation)

shuffleWords()

}

function shuffleWords(){

words.sort(()=>Math.random()-.5)

i=0
show=false

render()

}

function render(){

document.getElementById("counter").innerText=`Remaining: ${words.length}`

if(!words.length){

startWriting()

return

}

const w=words[i]

document.getElementById("word").innerText=w.word
document.getElementById("translation").innerText=show?w.translation:"?"

}

/* ----------------------------- CARD ----------------------------- */

function flip(){

show=!show
render()

}

function animateAndRun(dir,callback){

if(animating)return

animating=true

const card=document.getElementById("card")

const cls=dir==="left"?"fly-left":"fly-right"

card.classList.add(cls)

setTimeout(()=>{

callback()

card.classList.remove(cls)

animating=false

},220)

}

function remember(){

animateAndRun("left",()=>{

history.push(words[i])

words.splice(i,1)

if(i>=words.length)i=0

show=false

render()

})

}

function notRemember(){

animateAndRun("right",()=>{

const w=words.splice(i,1)[0]

history.push(w)

words.splice(i+3,0,w)

show=false

render()

})

}

function undo(){

if(!history.length)return

const w=history.pop()

words.splice(i,0,w)

render()

}

function resetDeck(){

buildDeck()

}

/* ----------------------------- WRITING ----------------------------- */

function startWriting(){

writing=true

writingWords=[...history].slice(0,10)

document.getElementById("cardView").style.display="none"
document.getElementById("writingView").style.display="block"

currentWritingIndex=0

nextWriting()

}

function nextWriting(){

if(currentWritingIndex>=writingWords.length){

alert("Writing complete")

return

}

const word=writingWords[currentWritingIndex].translation

currentAnswer=word.toLowerCase()

mistakes=0

buildWritingUI()

}

function buildWritingUI(){

const slotsDiv=document.getElementById("slots")
const lettersDiv=document.getElementById("letters")

slotsDiv.innerHTML=""
lettersDiv.innerHTML=""

currentSlots=[]

for(let i=0;i<currentAnswer.length;i++){

if(i===0){

currentSlots.push(currentAnswer[0])

}else{

currentSlots.push("_")

}

}

slotsDiv.innerText=currentSlots.join(" ")

const pool=currentAnswer.slice(1).split("").sort(()=>Math.random()-.5)

pool.forEach(l=>{

const btn=document.createElement("button")

btn.innerText=l

btn.onclick=()=>pressLetter(l,btn)

lettersDiv.appendChild(btn)

})

}

function pressLetter(letter,btn){

const index=currentSlots.indexOf("_")

if(index===-1)return

if(letter!==currentAnswer[index]){

mistakes++

btn.classList.add("error")

setTimeout(()=>btn.classList.remove("error"),300)

if(mistakes>=3){

alert(currentAnswer)

failWord()

}

return

}

currentSlots[index]=letter

document.getElementById("slots").innerText=currentSlots.join(" ")

if(!currentSlots.includes("_")){

successWord()

}

}

function successWord(){

currentWritingIndex++

setTimeout(nextWriting,400)

}

function failWord(){

writingWords.push(writingWords[currentWritingIndex])

currentWritingIndex++

setTimeout(nextWriting,400)

}

/* ----------------------------- SWIPE ----------------------------- */

let startX=0
let startY=0

const card=document.getElementById("card")

card.addEventListener("touchstart",e=>{

startX=e.changedTouches[0].clientX
startY=e.changedTouches[0].clientY

},{passive:true})

card.addEventListener("touchend",e=>{

const dx=e.changedTouches[0].clientX-startX
const dy=e.changedTouches[0].clientY-startY

if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy))return

if(dx<0)remember()
else notRemember()

},{passive:true})

/* ----------------------------- START ----------------------------- */

loadWords()

</script>

</body>
</html>
