<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Cards</title>

<style>

body{
font-family:sans-serif;
background:#f4f6fb;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
margin:30px auto;
max-width:400px;
}

.word{
font-size:40px;
margin-bottom:20px;
}

.translation{
font-size:30px;
color:#666;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

</style>

</head>

<body>

<h2>Word Cards</h2>

<div class="card" onclick="flip()">

<div id="word" class="word">
loading...
</div>

<div id="translation" class="translation">
?
</div>

</div>

<button onclick="flip()">Show</button>
<button onclick="nextCard()">Next</button>

<script>

const sheetID="1-4xkhAAXy0lWbbcWsFHuauzUyyckj-RkLPQJ-s4503M";
const sheetName="prilozenije";

let words=[];
let i=0;
let showAnswer=false;

function showCard(){

if(words.length===0){
document.getElementById("word").innerText="нет слов";
return;
}

document.getElementById("word").innerText=words[i].word;

document.getElementById("translation").innerText=
showAnswer ? words[i].translation : "?";

}

function flip(){

showAnswer=!showAnswer;
showCard();

}

function nextCard(){

i=(i+1)%words.length;
showAnswer=false;
showCard();

}

function loadWords(){

const url=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

fetch(url)
.then(r=>r.text())
.then(text=>{

const json=JSON.parse(text.substring(47).slice(0,-2));

const rows=json.table.rows;

words=rows.map(r=>({

word:r.c[3]?.v||"",
translation:r.c[5]?.v||""

}));

showCard();

});

}

loadWords();

</script>

</body>
</html>
