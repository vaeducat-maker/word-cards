<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Cards</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f6fb;
      margin: 0;
      padding: 24px 16px 40px;
      text-align: center;
      color: #222;
      -webkit-tap-highlight-color: transparent;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 28px;
    }

    .top-controls {
      max-width: 420px;
      margin: 0 auto 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    select, button {
      font-size: 16px;
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
    }

    select {
      background: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .card {
      background: white;
      padding: 36px 20px;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
      margin: 20px auto;
      max-width: 420px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      touch-action: pan-y;
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.995);
    }

    .word {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 18px;
      word-break: break-word;
    }

    .translation {
      font-size: 30px;
      color: #666;
      line-height: 1.3;
      word-break: break-word;
      min-height: 38px;
    }

    .buttons {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(59,130,246,0.25);
    }

    button.secondary {
      background: #64748b;
      box-shadow: 0 4px 14px rgba(100,116,139,0.25);
    }

    button.success {
      background: #16a34a;
      box-shadow: 0 4px 14px rgba(22,163,74,0.25);
    }

    button.danger {
      background: #dc2626;
      box-shadow: 0 4px 14px rgba(220,38,38,0.25);
    }

    button.warning {
      background: #f59e0b;
      box-shadow: 0 4px 14px rgba(245,158,11,0.25);
    }

    button:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 14px;
      color: #666;
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h2>Word Cards</h2>

  <div class="top-controls">
    <select id="modeSelect" onchange="changeMode()">
      <option value="ru-en">RU → EN</option>
      <option value="ru-et">RU → ET</option>
      <option value="ru-de">RU → DE</option>
      <option value="en-ru">EN → RU</option>
      <option value="et-ru">ET → RU</option>
      <option value="de-ru">DE → RU</option>
    </select>
  </div>

  <div class="card" id="card" onclick="flip()">
    <div id="word" class="word">loading...</div>
    <div id="translation" class="translation">?</div>
  </div>

  <div class="buttons">
    <button onclick="flip()">Show / Hide</button>
    <button onclick="nextCard()">Next</button>
    <button class="success" onclick="markKnown()">✅ Know</button>
    <button class="warning" onclick="undoLastKnown()">↩ Undo</button>
    <button onclick="speakAnswer()">🔊 Answer</button>
    <button class="secondary" onclick="shuffleWords()">🔀 Shuffle</button>
    <button class="danger" onclick="resetKnown()">♻ Reset known</button>
  </div>

  <div id="status" class="status"></div>

  <script>
    const sheetID = "1-4xkhAAXy0lWbbcWsFHuauzUyyckj-RkLPQJ-s4503M";
    const sheetName = "prilozenije";

    let rowsData = [];
    let words = [];
    let i = 0;
    let showAnswer = false;
    let currentMode = "ru-en";

    // для Undo храним последнюю убранную карточку
    let lastRemoved = null;

    // 0=id, 1=topic, 2=en, 3=de, 4=et, 5=ru
    const modeMap = {
      "ru-en": { front: 5, back: 2, speakLang: "en-US" },
      "ru-et": { front: 5, back: 4, speakLang: "et-EE" },
      "ru-de": { front: 5, back: 3, speakLang: "de-DE" },
      "en-ru": { front: 2, back: 5, speakLang: "ru-RU" },
      "et-ru": { front: 4, back: 5, speakLang: "ru-RU" },
      "de-ru": { front: 3, back: 5, speakLang: "ru-RU" }
    };

    function storageKey(mode) {
      return `known_cards_${sheetID}_${sheetName}_${mode}`;
    }

    function getKnownIds(mode) {
      try {
        return JSON.parse(localStorage.getItem(storageKey(mode)) || "[]");
      } catch {
        return [];
      }
    }

    function setKnownIds(mode, ids) {
      localStorage.setItem(storageKey(mode), JSON.stringify(ids));
    }

    function updateStatus() {
      const status = document.getElementById("status");
      const knownCount = getKnownIds(currentMode).length;

      if (!words.length) {
        status.innerText = `Колода закончилась 🎉 • Знаю: ${knownCount}`;
        return;
      }

      status.innerText = `Карточка ${i + 1} из ${words.length} • Знаю: ${knownCount}`;
    }

    function showCard() {
      const wordEl = document.getElementById("word");
      const trEl = document.getElementById("translation");

      if (!words.length) {
        wordEl.innerText = "Колода закончилась 🎉";
        trEl.innerText = "";
        updateStatus();
        return;
      }

      wordEl.innerText = words[i].word;
      trEl.innerText = showAnswer ? words[i].translation : "?";
      updateStatus();
    }

    function flip() {
      if (!words.length) return;
      showAnswer = !showAnswer;
      showCard();
    }

    function nextCard() {
      if (!words.length) return;
      i = (i + 1) % words.length;
      showAnswer = false;
      showCard();
    }

    function shuffleWords() {
      if (!words.length) return;

      for (let j = words.length - 1; j > 0; j--) {
        const k = Math.floor(Math.random() * (j + 1));
        [words[j], words[k]] = [words[k], words[j]];
      }

      i = 0;
      showAnswer = false;
      showCard();
    }

    function changeMode() {
      currentMode = document.getElementById("modeSelect").value;
      lastRemoved = null;
      buildWordsForMode(currentMode);
    }

    function buildWordsForMode(mode) {
      const map = modeMap[mode];
      const knownIds = getKnownIds(mode);

      words = rowsData
        .map(r => ({
          id: r[0] || "",
          word: r[map.front] || "",
          translation: r[map.back] || ""
        }))
        .filter(w => w.id && w.word && w.translation && !knownIds.includes(w.id));

      i = 0;
      showAnswer = false;
      showCard();
    }

    function markKnown() {
      if (!words.length) return;

      const currentCard = words[i];
      const removeIndex = i;
      const knownIds = getKnownIds(currentMode);

      if (!knownIds.includes(currentCard.id)) {
        knownIds.push(currentCard.id);
        setKnownIds(currentMode, knownIds);
      }

      lastRemoved = {
        mode: currentMode,
        card: currentCard,
        index: removeIndex
      };

      words.splice(removeIndex, 1);

      if (i >= words.length) {
        i = 0;
      }

      showAnswer = false;
      showCard();
    }

    function undoLastKnown() {
      if (!lastRemoved) return;
      if (lastRemoved.mode !== currentMode) return;

      const knownIds = getKnownIds(currentMode).filter(id => id !== lastRemoved.card.id);
      setKnownIds(currentMode, knownIds);

      const insertIndex = Math.min(lastRemoved.index, words.length);
      words.splice(insertIndex, 0, lastRemoved.card);

      i = insertIndex;
      showAnswer = false;
      showCard();

      lastRemoved = null;
    }

    function resetKnown() {
      localStorage.removeItem(storageKey(currentMode));
      lastRemoved = null;
      buildWordsForMode(currentMode);
    }

    function speakAnswer() {
      if (!words.length) return;

      const answerText = words[i].translation;
      if (!answerText) return;

      const utterance = new SpeechSynthesisUtterance(answerText);
      utterance.lang = modeMap[currentMode].speakLang;
      utterance.rate = 0.9;

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function loadWords() {
      const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

      fetch(url)
        .then(r => r.text())
        .then(text => {
          const json = JSON.parse(text.substring(47).slice(0, -2));
          const rows = json.table.rows || [];

          rowsData = rows.map(r => [
            r.c[0]?.v || "", // id
            r.c[1]?.v || "", // topic
            r.c[2]?.v || "", // en
            r.c[3]?.v || "", // de
            r.c[4]?.v || "", // et
            r.c[5]?.v || ""  // ru
          ]);

          buildWordsForMode(currentMode);
        })
        .catch(err => {
          console.error(err);
          document.getElementById("word").innerText = "Ошибка загрузки";
          document.getElementById("translation").innerText = "";
          document.getElementById("status").innerText = "Проверь таблицу или доступ";
        });
    }

    // Swipe:
    // вправо = next
    // влево = know
    const card = document.getElementById("card");
    let startX = 0;
    let startY = 0;
    let isSwiping = false;

    card.addEventListener("touchstart", function(e) {
      const touch = e.changedTouches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      isSwiping = true;
    }, { passive: true });

    card.addEventListener("touchend", function(e) {
      if (!isSwiping) return;

      const touch = e.changedTouches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;

      isSwiping = false;

      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) {
          nextCard();   // свайп вправо
        } else {
          markKnown();  // свайп влево
        }
      }
    }, { passive: true });

    loadWords();
  </script>
</body>
</html>
