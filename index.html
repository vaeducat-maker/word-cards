<!-- ================= JAVASCRIPT ================= -->
<script>

/* ================= SETTINGS ================= */

const sheetID = "1-4xkhAAXy0lWbbcWsFHuauzUyyckj-RkLPQJ-s4503M";
const sheetName = "estonian";

const SESSION_MS = 10 * 60 * 1000;

const STORAGE_LAST_MODE = "lastMode_v4";
const STORAGE_RESUME = "sessionResume_v4";
const STORAGE_LEARN_STATE = "learnState_v4";
const STORAGE_CAVE_STATE = "caveState_v4";
const STORAGE_WRITING_STAGE = "writingStage_v4";
const STORAGE_WORD_PROGRESS = "wordProgress_v1";

const modeMap = {
  "ru-et": {
    color: "#e8f4ff",
    speakLang: "et-EE",
    alphabet: "abcdefghijklmnopqrsšzžtuvwõäöüxy"
  }
};

const modeLabels = {
  "ru-et": "RU → ET"
};

/* ================= GLOBAL STATE ================= */

let rows = [];

let currentMode = localStorage.getItem(STORAGE_LAST_MODE) || "ru-et";
if(!modeMap[currentMode]) currentMode = "ru-et";

let currentView = null;
let sessionEnd = null;
let timerId = null;
let currentSessionId = null;

let cardsWords = [];
let cardsOriginal = [];
let cardsHistory = [];
let cardsIndex = 0;
let cardsShow = false;
let cardsAnimating = false;
let cardsPendingShow = null;

let writingDeck = [];
let writingIndex = 0;
let writingMistakes = 0;
let writingHelpMode = false;
let writingSuccessTarget = "left";
let writingAutoFailTimeout = null;

let celebrationPlayed = false;

/* ================= UI REFERENCES ================= */

const ui = {
  modeSelect: document.getElementById("modeSelect"),
  timer: document.getElementById("timer"),
  mainMenu: document.getElementById("mainMenu"),
  counter: document.getElementById("counter"),
  cardsView: document.getElementById("cardsView"),
  writingView: document.getElementById("writingView"),
  doneBox: document.getElementById("doneBox"),
  card: document.getElementById("card"),
  word: document.getElementById("word"),
  translation: document.getElementById("translation"),
  status: document.getElementById("status"),
  confettiLayer: document.getElementById("confettiLayer"),
  writeCard: document.getElementById("writeCard"),
  writePrompt: document.getElementById("writePrompt"),
  helpWord: document.getElementById("helpWord"),
  slots: document.getElementById("slots"),
  letterPool: document.getElementById("letterPool"),
  keyboard: document.getElementById("keyboard"),
  learnBtn: document.getElementById("learnBtn"),
  caveBtn: document.getElementById("caveBtn")
};

/* ================= HELPERS: BASIC ================= */

function saveLastMode(){
  localStorage.setItem(STORAGE_LAST_MODE, currentMode);
}

function populateModes(){
  ui.modeSelect.innerHTML = "";
  Object.keys(modeMap).forEach(key => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = modeLabels[key];
    if(key === currentMode) opt.selected = true;
    ui.modeSelect.appendChild(opt);
  });
}

function today(){
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function parseDate(v){
  if(!v) return null;

  if(typeof v === "string" && v.includes(".")){
    const p = v.split(".");
    return new Date(2000 + Number(p[2]), Number(p[1]) - 1, Number(p[0]));
  }

  const d = new Date(v);
  if(!isNaN(d)) return new Date(d.getFullYear(), d.getMonth(), d.getDate());

  return null;
}

function getAgeInDays(v){
  const d = parseDate(v);
  if(!d) return 9999;
  return Math.floor((today() - d) / 86400000);
}

function setStatus(text=""){
  ui.status.innerText = text;
}

function setCounter(n){
  ui.counter.innerText = `Remaining: ${n}`;
}

function showSection(section){
  ui.mainMenu.classList.add("hidden");
  ui.cardsView.classList.add("hidden");
  ui.writingView.classList.add("hidden");
  ui.doneBox.classList.add("hidden");
  ui.counter.classList.add("hidden");

  if(section === "menu"){
    ui.mainMenu.classList.remove("hidden");
  }else if(section === "cards"){
    ui.cardsView.classList.remove("hidden");
    ui.counter.classList.remove("hidden");
  }else if(section === "writing"){
    ui.writingView.classList.remove("hidden");
    ui.counter.classList.remove("hidden");
  }else if(section === "done"){
    ui.doneBox.classList.remove("hidden");
  }
  document.getElementById("progress").style.display =
    section === "cards" ? "block" : "none";
}

function applyColor(){
  const color = modeMap[currentMode].color;
  ui.card.style.background = color;
  ui.writeCard.style.background = color;
}
  function renderProgress(current){
  let str = "";

  for(let i = 0; i < 4; i++){
    str += i < current ? "🐾" : "▫";
  }

  document.getElementById("progress").innerText = str;
}

/* ================= HELPERS: CONFETTI ================= */

function launchConfetti(){
  if(celebrationPlayed) return;
  celebrationPlayed = true;

  ui.confettiLayer.innerHTML = "";
  const colors = ["#5aa9ff","#8b7cff","#ff9b42","#4cc98b","#ff6fa8","#ffd84d"];

  for(let n=0;n<28;n++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random()*100 + "%";
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    ui.confettiLayer.appendChild(piece);
  }

  setTimeout(()=>ui.confettiLayer.innerHTML="",2200);
}

function resetConfetti(){
  celebrationPlayed = false;
  ui.confettiLayer.innerHTML = "";
}

/* ================= TIMER ================= */

function startTimer(){
  clearInterval(timerId);
  sessionEnd = Date.now() + SESSION_MS;
  ui.timer.classList.remove("hidden");
  tickTimer();
  timerId = setInterval(tickTimer, 1000);
}

function stopTimer(){
  clearInterval(timerId);
  timerId = null;
  sessionEnd = null;
  ui.timer.classList.add("hidden");
}

function tickTimer(){
  if(!sessionEnd) return;
  const ms = sessionEnd - Date.now();

  if(ms <= 0){
    ui.timer.textContent = "00:00";
    finishSessionByTime();
    return;
  }

  const totalSec = Math.ceil(ms / 1000);
  const min = String(Math.floor(totalSec / 60)).padStart(2,"0");
  const sec = String(totalSec % 60).padStart(2,"0");
  ui.timer.textContent = `${min}:${sec}`;
}

/* ================= SAVE / LOAD SESSION ================= */

function saveResume(){
  if(!currentView) return;

  const data = {
    currentMode,
    currentView,
    currentSessionId,
    sessionLeftMs: Math.max(0, sessionEnd ? sessionEnd - Date.now() : 0),
    cardsWords,
    cardsOriginal,
    cardsHistory,
    cardsIndex,
    cardsShow,
    writingDeck,
    writingIndex,
    writingMistakes,
    writingHelpMode,
    writingSuccessTarget
  };

  localStorage.setItem(STORAGE_RESUME, JSON.stringify(data));
}

function loadResume(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_RESUME) || "null");
  }catch{
    return null;
  }
}

function clearResume(){
  localStorage.removeItem(STORAGE_RESUME);
}
  function getWordProgressStore(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_WORD_PROGRESS) || "{}");
  }catch{
    return {};
  }
}

function setWordProgressStore(store){
  localStorage.setItem(STORAGE_WORD_PROGRESS, JSON.stringify(store));
}

function getWordProgress(wordId){
  const store = getWordProgressStore();

  if(!store[wordId]){
    store[wordId] = {
      wordId,
      status: "new",
      correctDirect: 0,
      correctReverse: 0,
      correctWrite: 0,
      errorCount: 0,
      directSessionId: null,
      reverseSessionId: null,
      writeSessionId: null
    };
    setWordProgressStore(store);
  }

  if(store[wordId].directSessionId === undefined) store[wordId].directSessionId = null;
  if(store[wordId].reverseSessionId === undefined) store[wordId].reverseSessionId = null;
  if(store[wordId].writeSessionId === undefined) store[wordId].writeSessionId = null;

  return store[wordId];
}
 function updateWordProgress(wordId, patch){
  const store = getWordProgressStore();
  const current = getWordProgress(wordId);

  store[wordId] = {
    ...current,
    ...patch
  };

  setWordProgressStore(store);
}

function hasWordPassedDirectThisSession(wordId){
  const progress = getWordProgress(wordId);
  return progress.directSessionId === currentSessionId;
}

function hasWordPassedWriteThisSession(wordId){
  const progress = getWordProgress(wordId);
  return progress.writeSessionId === currentSessionId;
}
  function isWordSessionPassed(wordId){
  return (
    hasWordPassedDirectThisSession(wordId) &&
    hasWordPassedWriteThisSession(wordId)
  );
}
/* ================= WORD DATA ================= */

function makeStableId(rawId, rowIndex){
  const cleaned = String(rawId || "").trim();
  return `${cleaned || "row"}__${rowIndex}`;
}

function getAllCardsForMode(){
  return rows.map((r, rowIndex) => ({
    id: makeStableId(r[0], rowIndex),
    type: r[1],
    et: String(r[2] || "").trim(),
    et_form2: String(r[3] || "").trim(),
    et_form3: String(r[4] || "").trim(),
    ru: String(r[5] || "").trim(),
    date: r[6],
    word: String(r[5] || "").trim(),
    translation: String(r[2] || "").trim()
  })).filter(w => w.word && w.translation);
}

function getRecentPools(){
  const all = getAllCardsForMode();
  const last100 = all.slice(-100);
  const archive = all.slice(0, Math.max(0, all.length - 100));

  return {
    recent100: last100,
    archive
  };
}

/* ================= LEARN STATE ================= */

function getLearnState(){
  try{
    const store = JSON.parse(localStorage.getItem(STORAGE_LEARN_STATE) || "{}");
    return store[currentMode] || null;
  }catch{
    return null;
  }
}

function setLearnState(state){
  let store = {};
  try{
    store = JSON.parse(localStorage.getItem(STORAGE_LEARN_STATE) || "{}");
  }catch{}
  store[currentMode] = state;
  localStorage.setItem(STORAGE_LEARN_STATE, JSON.stringify(store));
}

function createInitialLearnState(){
  const { recent100 } = getRecentPools();
  const active = recent100.slice(-16);
const review = recent100.slice(0, Math.max(0, recent100.length - 16));
  return {
    currentIds: active.map(x => x.id),
    reviewIds: review.map(x => x.id)
  };
}

function getValidLearnState(){
  const { recent100 } = getRecentPools();
  const byId = Object.fromEntries(recent100.map(x => [x.id, x]));
  let state = getLearnState();

  if(!state){
    state = createInitialLearnState();
    setLearnState(state);
    return state;
  }

  state.currentIds = (state.currentIds || []).filter(id => byId[id]);
  state.reviewIds = (state.reviewIds || []).filter(id => byId[id] && !state.currentIds.includes(id));

  if(state.currentIds.length < 16){
  state = createInitialLearnState();
  setLearnState(state);
}

  return state;
}

function advanceLearnState(){
  const { recent100 } = getRecentPools();
  const byId = Object.fromEntries(recent100.map(x => [x.id, x]));
  const state = getValidLearnState();

  const currentIds = state.currentIds;
  const reviewIds = state.reviewIds;

  const newestCandidates = recent100
    .map(x => x.id)
    .filter(id => !currentIds.includes(id) && !reviewIds.includes(id));

  const new10 = newestCandidates.slice(-10);
  const prev5 = currentIds.slice(0, 5);
  const review5 = reviewIds.slice(-5);

  let next = [...new10, ...prev5, ...review5];

  const used = new Set(next);
  if(next.length < 16){
  const fill = recent100.map(x => x.id).filter(id => !used.has(id)).slice(-1 * (16 - next.length));
  next = [...next, ...fill];
}

  const mergedReview = [...reviewIds, ...currentIds];
  const dedupReview = [];
  const seen = new Set();
  mergedReview.forEach(id => {
    if(!seen.has(id) && !next.includes(id) && byId[id]){
      seen.add(id);
      dedupReview.push(id);
    }
  });

  const newState = {
    currentIds: next.slice(0,16),
    reviewIds: dedupReview.slice(-80)
  };

  setLearnState(newState);
  return newState;
}

function buildLearnCardsDeck(){
  const state = getValidLearnState();
  const { recent100 } = getRecentPools();
  const byId = Object.fromEntries(recent100.map(x => [x.id, x]));
  return state.currentIds.map(id => byId[id]).filter(Boolean);
}

/* ================= CAVE STATE ================= */

function getCaveState(){
  try{
    const store = JSON.parse(localStorage.getItem(STORAGE_CAVE_STATE) || "{}");
    return store[currentMode] || null;
  }catch{
    return null;
  }
}

function setCaveState(state){
  let store = {};
  try{
    store = JSON.parse(localStorage.getItem(STORAGE_CAVE_STATE) || "{}");
  }catch{}
  store[currentMode] = state;
  localStorage.setItem(STORAGE_CAVE_STATE, JSON.stringify(store));
}

function createInitialCaveState(){
  const { archive } = getRecentPools();
  const core = archive.slice(-10).map(x => x.id);
  return {
    dayIndex: 0,
    coreIds: core,
    randomHistory: []
  };
}

function buildCaveCardsDeck(){
  const { archive } = getRecentPools();
  const byId = Object.fromEntries(archive.map(x => [x.id, x]));
  if(!archive.length) return [];

  let state = getCaveState();
  if(!state){
    state = createInitialCaveState();
    setCaveState(state);
  }

  let coreIds = (state.coreIds || []).filter(id => byId[id]);
  if(coreIds.length < 10){
    state = createInitialCaveState();
    setCaveState(state);
    coreIds = state.coreIds;
  }

  const coreWords = coreIds.map(id => byId[id]).filter(Boolean);
  const exclude = new Set(coreIds);
  const randomWords = archive.filter(x => !exclude.has(x.id)).sort(()=>Math.random()-.5).slice(0,10);

  state.randomHistory[state.dayIndex] = randomWords.map(x => x.id);
  setCaveState(state);

  return [...coreWords, ...randomWords];
}

function advanceCaveState(){
  const { archive } = getRecentPools();
  const byId = Object.fromEntries(archive.map(x => [x.id, x]));
  if(!archive.length) return;

  let state = getCaveState();
  if(!state){
    state = createInitialCaveState();
  }

  state.dayIndex += 1;

  if(state.dayIndex >= 5){
    const newCore = [];
    for(let d=0; d<5; d++){
      const arr = (state.randomHistory[d] || []).filter(id => byId[id]);
      const shuffled = [...arr].sort(()=>Math.random()-.5).slice(0,2);
      newCore.push(...shuffled);
    }

    const uniqueCore = [...new Set(newCore)].filter(id => byId[id]);
    let finalCore = uniqueCore.slice(0,10);

    if(finalCore.length < 10){
      const fill = archive.map(x => x.id).filter(id => !finalCore.includes(id)).sort(()=>Math.random()-.5).slice(0,10-finalCore.length);
      finalCore = [...finalCore, ...fill];
    }

    state = {
      dayIndex: 0,
      coreIds: finalCore,
      randomHistory: []
    };
  }

  setCaveState(state);
}

function getPrimaryForm(fullWord){
  return String(fullWord || "").trim();
}

function buildWritingDeckFromWords(sourceWords, count, usePro = false){
  const slice = sourceWords.slice(0, count);

  return slice.map(w => ({
    id: w.id,
    prompt: w.ru,
    answer: usePro ? w.translation.trim() : getPrimaryForm(w.translation),
    fullRow: w.translation.trim(),
    stage: usePro ? 4 : getWritingStage(w.id)
  }));
}

function buildProDecksFrom16Words(sourceWords){
  const list = sourceWords.map(w => ({
    id: w.id,
    prompt: w.ru,
    answer: w.translation.trim(),
    fullRow: w.translation.trim(),
    stage: 4
  }));

  return [
    list.slice(0,4),
    list.slice(4,8),
    list.slice(8,12),
    list.slice(12,16)
  ];
}

function getAlphabetForCurrentMode(){

function normalizeChars(answer){
  return answer.split("");
}

function buildStageTemplate(answer, stage){
  const chars = answer.split("");
  const fixedChars = [" ", "-", ",", ".", ":", ";", "!", "?", "(", ")", "'", "\""];

  if(stage === 1){
    const filled = [];
    const locked = [];
    const pool = [];

    let newWord = true;

    chars.forEach(ch => {
      const isFixed = fixedChars.includes(ch);

      if(isFixed){
        filled.push(ch);
        locked.push(true);
        newWord = true;
        return;
      }

      if(newWord){
        filled.push(ch);
        locked.push(true);
        newWord = false;
      }else{
        filled.push("");
        locked.push(false);
        pool.push(ch);
      }
    });

    return {
      filled,
      locked,
      pool: pool.sort(()=>Math.random()-.5),
      drag: true
    };
  }

  const len = chars.length;

  let blanks = 2;
  if(stage === 3) blanks = Math.max(4, Math.ceil(len * 0.67));
  if(stage >= 4) blanks = len;

  const filled = [...chars];
  const locked = Array(len).fill(true);

  const letterIndices = chars
    .map((ch, idx) => fixedChars.includes(ch) ? null : idx)
    .filter(idx => idx !== null);

  const indices = [...letterIndices].sort(()=>Math.random()-.5).slice(0, blanks);

  indices.forEach(idx => {
    filled[idx] = "";
    locked[idx] = false;
  });

  const keyboardCount = stage >= 4 ? 15 : 10;
const answerLetters = chars.filter(ch => !fixedChars.includes(ch));
const pool = [...answerLetters];

while(pool.length < keyboardCount && answerLetters.length){
  const rnd = answerLetters[Math.floor(Math.random() * answerLetters.length)];
  pool.push(rnd);
}

  return {
    filled,
    locked,
    pool: pool.sort(()=>Math.random()-.5),
    drag: false
  };
}
function getFirstEmptyIndex(arr){
  return arr.findIndex(x => x === "");
}

function placeDragLetter(ch, btn){
  if(writingHelpMode) return;

  const item = writingDeck[writingIndex];
  const idx = getFirstEmptyIndex(item._filled);
  if(idx === -1) return;

  const correct = item.answer[idx];

  if(ch === correct){
    item._filled[idx] = ch;
    writingMistakes = 0;
    btn.style.background = "#bbf7d0";
    btn.style.transform = "scale(1.12)";
    btn.style.transition = "all 0.15s ease";

    setTimeout(() => {
      btn.remove();
      refreshSlots();

      if(item._filled.join("") === item.answer){
        handleWritingSuccess("left");
      }
    }, 150);

    return;
  }

  writingMistakes += 1;
  btn.classList.add("wrong");
  setTimeout(()=>btn.classList.remove("wrong"), 260);

  if(writingMistakes >= 3){
    enterWritingHelpMode();
  }
}

  ui.helpWord.style.marginTop = "18px";
  ui.helpWord.style.marginBottom = "10px";
  ui.helpWord.style.transform = "scale(1)";
  ui.helpWord.style.transition = "all 1.8s ease";

  if(writingAutoFailTimeout){
    clearTimeout(writingAutoFailTimeout);
  }

  writingAutoFailTimeout = setTimeout(() => {
    handleWritingSuccess("right");
  }, 3200);
}
function animateWriting(direction, callback){
  if(cardsAnimating) return;
  cardsAnimating = true;

  const cls = direction === "left" ? "fly-left" : "fly-right";
  ui.writeCard.classList.add(cls);

  setTimeout(() => {
    callback();
    ui.writeCard.classList.remove(cls);
    cardsAnimating = false;
  }, 220);
}

function handleWritingSuccess(direction){
  if(writingAutoFailTimeout){
    clearTimeout(writingAutoFailTimeout);
    writingAutoFailTimeout = null;
  }

  const item = writingDeck[writingIndex];

  if(direction === "left"){
  const progress = getWordProgress(item.id);

  if(progress.writeSessionId !== currentSessionId){
    updateWordProgress(item.id, {
      correctWrite: progress.correctWrite + 1,
      writeSessionId: currentSessionId,
      status: "learning"
    });
  }

  if(!currentView.includes("pro-")){
    bumpWritingStage(item.id);
  }
}

  if(direction === "right"){
    animateWriting("right", () => {
      const w = writingDeck.splice(writingIndex, 1)[0];
      const returnAfter = 2 + Math.floor(Math.random() * 3);
      let newIndex = writingIndex + returnAfter;

      if(newIndex > writingDeck.length) newIndex = writingDeck.length;
      writingDeck.splice(newIndex, 0, w);

      writingMistakes = 0;
      writingHelpMode = false;
      writingSuccessTarget = "left";
      renderWriting();
      saveResume();
    });
    return;
  }

  animateWriting("left", () => {
    writingDeck.splice(writingIndex, 1);
    writingMistakes = 0;
    writingHelpMode = false;
    writingSuccessTarget = "left";
    renderWriting();
    saveResume();
  });
}

/* ================= NAVIGATION ================= */

function backToMenu(){
  if(writingAutoFailTimeout){
    clearTimeout(writingAutoFailTimeout);
    writingAutoFailTimeout = null;
  }
  stopTimer();
  clearResume();
  currentSessionId = null;
  currentView = null;
  setStatus("");
  showSection("menu");
}

/* ================= LOAD DATA ================= */

function loadWords(){
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

  fetch(url)
    .then(r => r.text())
    .then(text => {
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rowsRaw = json.table.rows || [];

      rows = rowsRaw.map(r => [
        r.c[0]?.v || "",
        r.c[1]?.v || "",
        r.c[2]?.v || "",
        r.c[3]?.v || "",
        r.c[4]?.v || "",
        r.c[5]?.v || "",
        r.c[6]?.f || r.c[6]?.v || ""
      ]);

      initApp();
    })
    .catch(() => {
      ui.word.innerText = "Loading error";
      ui.translation.innerText = "";
      setStatus("Check sheet or access");
    });
}

/* ================= INIT APP ================= */

function initApp(){
  populateModes();
  ui.modeSelect.value = currentMode;
  saveLastMode();
  applyColor();

  const resume = loadResume();

  if(resume && resume.currentMode === currentMode){
    continueFromResume(resume);
  }else{
    showSection("menu");
  }
}

/* ================= EVENTS ================= */

ui.modeSelect.addEventListener("change", () => {
  if(writingAutoFailTimeout){
    clearTimeout(writingAutoFailTimeout);
    writingAutoFailTimeout = null;
  }
  currentMode = ui.modeSelect.value;
  saveLastMode();
  clearResume();
  stopTimer();
  currentView = null;
  setStatus("");
  applyColor();
  showSection("menu");
});

ui.learnBtn.addEventListener("click", () => startNewSession("learn"));
ui.caveBtn.addEventListener("click", () => startNewSession("cave"));

let startX = 0;
let startY = 0;

ui.card.addEventListener("touchstart", e => {
  startX = e.changedTouches[0].clientX;
  startY = e.changedTouches[0].clientY;
}, { passive: true });

ui.card.addEventListener("touchend", e => {

  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;

  if(Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;

  if(dx < 0){
  // ничего не делаем
}else{

}
}, 
                         { passive: true });
